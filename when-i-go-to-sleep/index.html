(function(){var st=null;
function apply(){try{
var f=sessionStorage.getItem('cpFrom');sessionStorage.removeItem('cpFrom');
if(f===null)return;f=parseInt(f,10);if(isNaN(f))return;
var STEP=200,c='';
for(var i=0;i<16;i++){
var d=Math.abs((i>>1)-(f>>1))*STEP;
c+='::view-transition-old(cptile'+i+'){animation-delay:'+d+'ms}';
}
if(!st){st=document.createElement('style');document.head.appendChild(st);}
st.textContent=c;
}catch(e){}}
if('onpagereveal' in window){window.addEventListener('pagereveal',apply);}
else{apply();}
})();
